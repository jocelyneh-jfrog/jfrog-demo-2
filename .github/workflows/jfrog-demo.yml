name: JFrog Security Demo Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_NAME: jfrog-vulnerable-demo
  BUILD_NUMBER: ${{ github.run_number }}
  JF_URL: ${{ secrets.JF_URL }}
  JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
  NPM_REPO: demo-npm
  DOCKER_REPO: demo-docker-local
  IMAGE_NAME: jfrog-vulnerable-demo
  EVIDENCE_KEY_ALIAS: demo-signing-key

jobs:
  security-pipeline:
    name: "JFrog Security Demo Pipeline"
    runs-on: ubuntu-latest
    steps:

      # -----------------------------------------------------------------------
      # SETUP
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JF_URL }}
          JF_ACCESS_TOKEN: ${{ env.JF_ACCESS_TOKEN }}

      - name: Configure npm to resolve through Artifactory
        run: |
          jf npmc \
            --repo-resolve ${{ env.NPM_REPO }}

      # -----------------------------------------------------------------------
      # CURATION
      # -----------------------------------------------------------------------
      - name: "Curation - Enforce Package Intake Policies"
        run: |
          jf audit \
            --curation \
            --format=table \
            --fail=false
        continue-on-error: true

      - name: "Curation - Export results (JSON)"
        run: |
          jf audit \
            --curation \
            --format=json \
            --fail=false > curation-results.json 2>&1 || true

      # -----------------------------------------------------------------------
      # ADVANCED SECURITY - SECRETS DETECTION
      # -----------------------------------------------------------------------
      - name: "Advanced Security - Secrets Detection"
        run: |
          jf audit \
            --secrets=true \
            --sast=false \
            --format=table \
            --fail=false
        continue-on-error: true

      # -----------------------------------------------------------------------
      # ADVANCED SECURITY - SAST
      # -----------------------------------------------------------------------
      - name: "Advanced Security - SAST"
        run: |
          jf audit \
            --sast=true \
            --secrets=false \
            --format=table \
            --fail=false
        continue-on-error: true

      - name: "Advanced Security - Export combined results (JSON)"
        run: |
          jf audit \
            --secrets=true \
            --sast=true \
            --format=json \
            --fail=false > advanced-security-results.json 2>&1 || true

      # -----------------------------------------------------------------------
      # BUILD + PUBLISH BUILD INFO
      # -----------------------------------------------------------------------
      - name: "Build - Install dependencies via Artifactory"
        run: |
          jf npm install \
            --build-name="${{ env.BUILD_NAME }}" \
            --build-number="${{ env.BUILD_NUMBER }}" \
            --module=npm-app

      - name: "Build - Attach Git context to Build Info"
        run: |
          jf rt build-add-git \
            "${{ env.BUILD_NAME }}" \
            "${{ env.BUILD_NUMBER }}"

      - name: "Build - Collect environment variables"
        run: |
          jf rt build-collect-env \
            "${{ env.BUILD_NAME }}" \
            "${{ env.BUILD_NUMBER }}"

      - name: "Build - Publish Build Info to Artifactory"
        run: |
          jf rt build-publish \
            "${{ env.BUILD_NAME }}" \
            "${{ env.BUILD_NUMBER }}"

      # -----------------------------------------------------------------------
      # DOCKER BUILD + PUSH TO ARTIFACTORY
      # -----------------------------------------------------------------------
      - name: "Docker - Authenticate with Artifactory registry"
        run: |
          echo "${{ secrets.JF_ACCESS_TOKEN }}" | docker login \
            "${{ secrets.JF_REGISTRY }}" \
            --username "${{ secrets.JF_USER }}" \
            --password-stdin

      - name: "Docker - Build image"
        run: |
          docker build \
            --tag "${{ secrets.JF_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_NUMBER }}" \
            --tag "${{ secrets.JF_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:latest" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.source=${{ github.repositoryUrl }}" \
            --label "build.name=${{ env.BUILD_NAME }}" \
            --label "build.number=${{ env.BUILD_NUMBER }}" \
            .

      - name: "Docker - Push image to Artifactory"
        run: |
          jf docker push \
            "${{ secrets.JF_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_NUMBER }}" \
            --build-name="${{ env.BUILD_NAME }}" \
            --build-number="${{ env.BUILD_NUMBER }}" \
            --module=docker-image

      - name: "Docker - Push latest tag"
        run: |
          docker push \
            "${{ secrets.JF_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:latest"

      # -----------------------------------------------------------------------
      # EVIDENCE + ATTESTATION
      # -----------------------------------------------------------------------
      - name: "Attestation - Assemble evidence predicate"
        run: |
          cat > evidence-predicate.json << EOF
          {
            "predicateType": "https://jfrog.com/evidence/supply-chain-demo/v1",
            "buildName": "${{ env.BUILD_NAME }}",
            "buildNumber": "${{ env.BUILD_NUMBER }}",
            "commitSha": "${{ github.sha }}",
            "repository": "${{ github.repository }}",
            "image": "${{ secrets.JF_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_NUMBER }}",
            "runUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "scans": {
              "curation":         $(cat curation-results.json          2>/dev/null || echo '{}'),
              "advancedSecurity": $(cat advanced-security-results.json 2>/dev/null || echo '{}')
            }
          }
          EOF

      - name: "Attestation - Create and sign evidence in Artifactory"
        run: |
          jf evidence create \
            --subject-build-name="${{ env.BUILD_NAME }}" \
            --subject-build-number="${{ env.BUILD_NUMBER }}" \
            --predicate=evidence-predicate.json \
            --predicate-type=https://jfrog.com/evidence/supply-chain-demo/v1 \
            --key="${{ secrets.EVIDENCE_PRIVATE_KEY }}" \
            --key-alias="${{ env.EVIDENCE_KEY_ALIAS }}"

      - name: "Attestation - Verify signature (round-trip check)"
        run: |
          jf evidence verify \
            --subject-build-name="${{ env.BUILD_NAME }}" \
            --subject-build-number="${{ env.BUILD_NUMBER }}" \
            --key-alias="${{ env.EVIDENCE_KEY_ALIAS }}"

      # -----------------------------------------------------------------------
      # UPLOAD ALL ARTIFACTS + SUMMARY
      # -----------------------------------------------------------------------
      - name: Upload all scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-scan-results
          path: |
            curation-results.json
            advanced-security-results.json
            evidence-predicate.json

      - name: Pipeline summary
        if: always()
        run: |
          echo "# JFrog Security Demo - Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Product | What it covers |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Curation | JFrog Curation | Package intake policies — malicious pkgs, CVE threshold, license ban |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets Detection | JFrog Advanced Security | Hardcoded secrets in config/, .env, scripts/ |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST | JFrog Advanced Security | Insecure code patterns in src/ |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Info | Artifactory | Immutable build record — deps, git context, env |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build + Push | Artifactory | Image pushed to \`${{ env.DOCKER_REPO }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Attestation | JFrog Evidence | Signed provenance bundle stored in Artifactory |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build:** \`${{ env.BUILD_NAME }}#${{ env.BUILD_NUMBER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ secrets.JF_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_NUMBER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

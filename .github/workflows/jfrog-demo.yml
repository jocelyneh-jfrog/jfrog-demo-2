name: JFrog Security Demo Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_NAME: jfrog-vulnerable-demo
  BUILD_NUMBER: ${{ github.run_number }}
  JF_URL: ${{ secrets.JF_URL }}
  JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
  JF_USER: ${{ secrets.JF_USER }}
  NPM_REPO: demo-npm-virtual
  DOCKER_REPO: demo-docker-local
  IMAGE_NAME: jfrog-vulnerable-demo
  EVIDENCE_KEY_ALIAS: demo-signing-key

jobs:
  security-pipeline:
    name: "JFrog Security Demo Pipeline"
    runs-on: ubuntu-latest
    steps:

      # -----------------------------------------------------------------------
      # SETUP
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      -  name: Check JFrog CLI version
          run: jf --version
         env:
          JF_URL: ${{ env.JF_URL }}
          JF_ACCESS_TOKEN: ${{ env.JF_ACCESS_TOKEN }}
          JF_USER: ${{ env.JF_USER }}

      - name: Configure npm to resolve through Artifactory
        run: |
          jf npmc \
            --repo-resolve ${{ env.NPM_REPO }} \
            --server-id-resolve setup-jfrog-cli-server

      # -----------------------------------------------------------------------
      # CURATION
      # Correct command: jf curation-audit (alias: jf ca)
      # Contacts the Artifactory Curation API and checks every dependency
      # against configured Curation policies.
      # Blocks: malicious packages, CVE severity thresholds, banned licenses.
      # Requires: Curation enabled on your Artifactory instance + npm repo
      #           configured with Curation in Administration > Curation.
      # -----------------------------------------------------------------------
      - name: "Curation - Enforce Package Intake Policies"
        run: |
          jf curation-audit \
            --format=table
        continue-on-error: true

      - name: "Curation - Export results (JSON)"
        run: |
          jf curation-audit \
            --format=json > curation-results.json 2>&1 || true

      # -----------------------------------------------------------------------
      # XRAY AUDIT
      # Full Xray-powered CVE + license audit on the dependency tree.
      # Hits the Xray API and returns vulnerability details, CVSS scores,
      # and license compliance findings across all dependencies.
      # -----------------------------------------------------------------------
      - name: "Xray Audit - CVE and License Analysis"
        run: |
          jf audit \
            --format=table \
            --fail=false
        continue-on-error: true

      - name: "Xray Audit - Export results (JSON)"
        run: |
          jf audit \
            --format=json \
            --fail=false > xray-audit-results.json 2>&1 || true

      # -----------------------------------------------------------------------
      # ADVANCED SECURITY - SECRETS DETECTION
      # Scans all files and full git history for hardcoded secrets.
      # Findings expected in: config/, scripts/, .env, src/index.js
      # Requires: JFrog Advanced Security license.
      # -----------------------------------------------------------------------
      - name: "Advanced Security - Secrets Detection"
        run: |
          jf audit \
            --secrets \
            --format=table \
            --fail=false
        continue-on-error: true

      # -----------------------------------------------------------------------
      # ADVANCED SECURITY - SAST
      # Static analysis for insecure code patterns in src/:
      # Prototype pollution, RCE via template injection, SSRF, ReDoS,
      # JWT algorithm confusion, path traversal, XSS.
      # Requires: JFrog Advanced Security license.
      # -----------------------------------------------------------------------
      - name: "Advanced Security - SAST"
        run: |
          jf audit \
            --sast \
            --format=table \
            --fail=false
        continue-on-error: true

      - name: "Advanced Security - Export combined results (JSON)"
        run: |
          jf audit \
            --secrets \
            --sast \
            --format=json \
            --fail=false > advanced-security-results.json 2>&1 || true

      # -----------------------------------------------------------------------
      # BUILD + PUBLISH BUILD INFO
      # Installs all dependencies through Artifactory (gated by Curation).
      # Captures the full dependency graph, git context, and CI environment
      # as an immutable Build Info record in Artifactory.
      # -----------------------------------------------------------------------
      - name: "Build - Install dependencies via Artifactory"
        run: |
          jf npm install \
            --build-name="${{ env.BUILD_NAME }}" \
            --build-number="${{ env.BUILD_NUMBER }}" \
            --module=npm-app

      - name: "Build - Attach Git context to Build Info"
        run: |
          jf rt build-add-git \
            "${{ env.BUILD_NAME }}" \
            "${{ env.BUILD_NUMBER }}"

      - name: "Build - Collect environment variables"
        run: |
          jf rt build-collect-env \
            "${{ env.BUILD_NAME }}" \
            "${{ env.BUILD_NUMBER }}"

      - name: "Build - Publish Build Info to Artifactory"
        run: |
          jf rt build-publish \
            "${{ env.BUILD_NAME }}" \
            "${{ env.BUILD_NUMBER }}"

      # -----------------------------------------------------------------------
      # DOCKER BUILD + PUSH TO ARTIFACTORY
      # Builds the container image and pushes it to Artifactory.
      # Using jf docker push captures the image in Build Info alongside
      # the npm deps so Xray scans both in one build-scan call.
      # -----------------------------------------------------------------------
      - name: "Docker - Authenticate with Artifactory registry"
        run: |
          echo "${{ env.JF_ACCESS_TOKEN }}" | docker login \
            "${{ secrets.JF_REGISTRY }}" \
            --username "${{ env.JF_USER }}" \
            --password-stdin

      - name: "Docker - Build image"
        run: |
          docker build \
            --tag "${{ secrets.JF_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_NUMBER }}" \
            --tag "${{ secrets.JF_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:latest" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.source=${{ github.repositoryUrl }}" \
            --label "build.name=${{ env.BUILD_NAME }}" \
            --label "build.number=${{ env.BUILD_NUMBER }}" \
            .

      - name: "Docker - Push image to Artifactory"
        run: |
          jf docker push \
            "${{ secrets.JF_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_NUMBER }}" \
            --build-name="${{ env.BUILD_NAME }}" \
            --build-number="${{ env.BUILD_NUMBER }}" \
            --module=docker-image

      - name: "Docker - Push latest tag"
        run: |
          docker push \
            "${{ secrets.JF_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:latest"

      # -----------------------------------------------------------------------
      # XRAY BUILD SCAN
      # Deep recursive scan on the published build graph in Artifactory.
      # Covers both npm dependencies and Docker image layers.
      # Surfaces 15+ CVEs and attaches findings to the build record.
      # -----------------------------------------------------------------------
      - name: "Xray - Scan Published Build"
        run: |
          jf build-scan \
            --fail=false \
            --format=table \
            "${{ env.BUILD_NAME }}" \
            "${{ env.BUILD_NUMBER }}"
        continue-on-error: true

      - name: "Xray - Export build scan results (JSON)"
        run: |
          jf build-scan \
            --fail=false \
            --format=json \
            "${{ env.BUILD_NAME }}" \
            "${{ env.BUILD_NUMBER }}" > xray-build-results.json 2>&1 || true

      # -----------------------------------------------------------------------
      # EVIDENCE + ATTESTATION
      # Assembles all scan results into a signed SLSA-style predicate and
      # stores it in Artifactory as verifiable evidence on the build.
      # -----------------------------------------------------------------------
      - name: "Attestation - Assemble evidence predicate"
        run: |
          cat > evidence-predicate.json << EOF
          {
            "predicateType": "https://jfrog.com/evidence/supply-chain-demo/v1",
            "buildName": "${{ env.BUILD_NAME }}",
            "buildNumber": "${{ env.BUILD_NUMBER }}",
            "commitSha": "${{ github.sha }}",
            "repository": "${{ github.repository }}",
            "image": "${{ secrets.JF_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_NUMBER }}",
            "runUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "scans": {
              "curation":         $(cat curation-results.json          2>/dev/null || echo '{}'),
              "xrayAudit":        $(cat xray-audit-results.json        2>/dev/null || echo '{}'),
              "advancedSecurity": $(cat advanced-security-results.json 2>/dev/null || echo '{}'),
              "xrayBuild":        $(cat xray-build-results.json        2>/dev/null || echo '{}')
            }
          }
          EOF

      - name: "Attestation - Create and sign evidence in Artifactory"
        run: |
          jf evidence create \
            --subject-build-name="${{ env.BUILD_NAME }}" \
            --subject-build-number="${{ env.BUILD_NUMBER }}" \
            --predicate=evidence-predicate.json \
            --predicate-type=https://jfrog.com/evidence/supply-chain-demo/v1 \
            --key="${{ secrets.EVIDENCE_PRIVATE_KEY }}" \
            --key-alias="${{ env.EVIDENCE_KEY_ALIAS }}"

      - name: "Attestation - Verify signature"
        run: |
          jf evidence verify \
            --subject-build-name="${{ env.BUILD_NAME }}" \
            --subject-build-number="${{ env.BUILD_NUMBER }}" \
            --key-alias="${{ env.EVIDENCE_KEY_ALIAS }}"

      # -----------------------------------------------------------------------
      # UPLOAD ALL ARTIFACTS + SUMMARY
      # -----------------------------------------------------------------------
      - name: Upload all scan results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: all-scan-results
          path: |
            curation-results.json
            xray-audit-results.json
            advanced-security-results.json
            xray-build-results.json
            evidence-predicate.json

      - name: Pipeline summary
        if: always()
        run: |
          echo "# JFrog Security Demo - Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Command | Product | What it covers |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|---------|----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Curation | \`jf curation-audit\` | JFrog Curation | Package intake policies — malicious pkgs, CVE threshold, license ban |" >> $GITHUB_STEP_SUMMARY
          echo "| Xray Audit | \`jf audit\` | JFrog Xray | CVE + license analysis on full dependency tree |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets Detection | \`jf audit --secrets\` | JFrog Advanced Security | Hardcoded secrets in config/, .env, scripts/ |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST | \`jf audit --sast\` | JFrog Advanced Security | Insecure code patterns in src/ |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Info | \`jf rt build-publish\` | Artifactory | Immutable build record — deps, git context, env |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build + Push | \`jf docker push\` | Artifactory | Image pushed to \`${{ env.DOCKER_REPO }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Xray Build Scan | \`jf build-scan\` | JFrog Xray | 15+ CVEs across npm deps + Docker image layers |" >> $GITHUB_STEP_SUMMARY
          echo "| Attestation | \`jf evidence create\` | JFrog Evidence | Signed provenance bundle stored in Artifactory |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build:** \`${{ env.BUILD_NAME }}#${{ env.BUILD_NUMBER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ secrets.JF_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_NUMBER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY